name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret required. One-time
# setup: on PyPI add a trusted publisher for this repo + workflow
# (https://docs.pypi.org/trusted-publishers/). Or swap the publish step for a
# token: `with: { password: ${{ secrets.PYPI_API_TOKEN }} }`.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/reapk/
    permissions:
      id-token: write          # required for trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
